yamlname: CI Java con NetBeans

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Cambia a '11' o '21' si usas otra versión
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Probar con Maven
      run: mvn -B test