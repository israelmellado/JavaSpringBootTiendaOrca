spring.application.name=TiendaVirtualOrmSpringBoot
# Conexión MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_virtual
spring.datasource.username=root
spring.datasource.password=12345678

# JPA/Hibernate
spring.jpa.show-sql=true

# Server
server.port=8080


# 1. Configuración global y de rendimiento de Ollama para tu i7
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=80
spring.ai.ollama.chat.options.num-thread=4

# 2. NUEVA CONFIGURACIÓN: Cliente MCP Web por HTTP/SSE (Evita bloqueos de Windows)

spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.transport=stdio
spring.ai.mcp.client.stdio.command=python
spring.ai.mcp.client.stdio.args=server.py
spring.ai.mcp.client.stdio.working-directory=C:/Users/Israel/Documents/NetBeansProjects/TiendavirtualOrmSprinBoot/InitializrSpringbootProject/mcp-server
 


logging.level.org.springframework.ai=TRACE
logging.level.org.springframework.ai.mcp=TRACE
