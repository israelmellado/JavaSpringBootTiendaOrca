<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido - Tienda ORCA</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <link rel="stylesheet" th:href="@{/chatbot.css}">
</head>
<body>
    <div class="header">
        <h1>➕ Nuevo Pedido - Tienda ORCA</h1>
        <div>
            <a th:href="@{/pedidos}"><button class="btn btn-info">Volver</button></a>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Seleccionar Cliente</h2>
            
            <form th:action="@{/pedidos/crear}" method="post">
                <div class="form-group">
                    <label>Cliente *</label>
                    <select name="idCliente" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="cliente : ${clientes}" 
                                th:value="${cliente.id}" 
                                th:text="${cliente.nombre} + ' (' + ${cliente.email} + ')'">
                            Cliente
                        </option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">Continuar</button>
            </form>
        </div>
    </div>
    <div th:replace="~{chatbot :: widget}"></div>
    <!-- Lógica JavaScript para contraer y expandir -->
    <script th:inline="javascript">
       document.addEventListener("DOMContentLoaded", function() {
                const chatbot = document.getElementById("chatbot-widget");
                const icon = document.getElementById("chatbot-toggle-icon");
                const tieneRespuesta = chatbot.getAttribute("data-tiene-respuesta") === "true";
                
                if (tieneRespuesta) {
                    chatbot.classList.remove("collapsed");
                    icon.textContent = "▼";
                }
            });

            function toggleChatbot() {
                const chatbot = document.getElementById("chatbot-widget");
                const icon = document.getElementById("chatbot-toggle-icon");
                
                if (chatbot.classList.contains("collapsed")) {
                    chatbot.classList.remove("collapsed");
                    icon.textContent = "▼";
                } else {
                    chatbot.classList.add("collapsed");
                    icon.textContent = "▲";
                }
            }
        </script>
</body>
</html>
