<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menú - Tienda ORCA</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <link rel="stylesheet" th:href="@{/index.css}">
    <link rel="stylesheet" th:href="@{/chatbot.css}">
    
</head>
<body>
    <div class="menu-container">
        <h1>Tienda ORCA</h1>
        <p>Bienvenido</p>
        
        <div class="menu-opciones">
            <a th:href="@{/articulos}" class="btn-menu">📦 Artículos</a>
            <a th:href="@{/clientes}" class="btn-menu">👥 Clientes</a>
            <a th:href="@{/pedidos}" class="btn-menu">📋 Pedidos</a>
            <a th:href="@{/dashboard}" class="btn-menu">⚙️ Gestión</a>
        </div>
        
        <br>
        <a th:href="@{/logout}" class="btn-cerrar">Cerrar Sesión</a>
    </div>
    <div th:replace="~{chatbot :: widget}"></div>
    <!-- Lógica JavaScript para contraer y expandir -->
    <script th:inline="javascript">
       document.addEventListener("DOMContentLoaded", function() {
                const chatbot = document.getElementById("chatbot-widget");
                const icon = document.getElementById("chatbot-toggle-icon");
                const tieneRespuesta = chatbot.getAttribute("data-tiene-respuesta") === "true";
                
                if (tieneRespuesta) {
                    chatbot.classList.remove("collapsed");
                    icon.textContent = "▼";
                }
            });

            function toggleChatbot() {
                const chatbot = document.getElementById("chatbot-widget");
                const icon = document.getElementById("chatbot-toggle-icon");
                
                if (chatbot.classList.contains("collapsed")) {
                    chatbot.classList.remove("collapsed");
                    icon.textContent = "▼";
                } else {
                    chatbot.classList.add("collapsed");
                    icon.textContent = "▲";
                }
            }
        </script>
    
</body>
</html>
