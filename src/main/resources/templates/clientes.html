<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Clientes - Tienda ORCA</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <link rel="stylesheet" th:href="@{/cliente.css}">
    <script>
        function mostrarEditar(id) {
            document.querySelectorAll('.fila-editar').forEach(function(f) { f.classList.remove('show'); });
            document.getElementById('editar-' + id).classList.add('show');
        }
        function cancelarEditar() {
            document.querySelectorAll('.fila-editar').forEach(function(f) { f.classList.remove('show'); });
        }
        /*Deplegar nuevo cliente*/
        function toggleFormulario() {
            var panel = document.getElementById('panel-nuevo');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            } else {
                panel.style.display = 'none';
            }
        }
    </script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>👥 Tienda ORCA - Clientes</h1>
        <div>
            <a th:href="@{/menu}"><button class="btn btn-info">Volver</button></a>
            <a th:href="@{/logout}"><button class="btn btn-danger">Cerrar Sesión</button></a>
        </div>
    </div>

    <div class="container">
        <!-- Mensajes -->
        <div th:if="${mensaje}" class="mensaje mensaje-exito">
            <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error}" class="mensaje mensaje-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <a th:href="@{/clientes}"><button class="tab" th:classappend="${activa == 'todos'} ? 'active'">Todos</button></a>
            <a th:href="@{/clientes/estandar}"><button class="tab" th:classappend="${activa == 'estandar'} ? 'active'">Estandar</button></a>
            <a th:href="@{/clientes/premium}"><button class="tab" th:classappend="${activa == 'premium'} ? 'active'">Premium</button></a>
            <a th:href="@{/clientes/baja}"><button class="tab" th:classappend="${activa == 'baja'} ? 'active'">En Baja</button></a>
        </div>

       <!-- Panel Nuevo Cliente -->
        <div class="panel" th:if="${activa != 'baja'}">
            <h2 style="cursor:pointer;" onclick="toggleFormulario()">➕ Nuevo Cliente ▾</h2>

            <div id="panel-nuevo" style="display:none;">
                <!-- Selector tipo cliente -->
                <div style="margin-bottom: 15px;">
                    <label><input type="radio" name="tipo" value="estandar" checked onchange="document.getElementById('form-estandar').style.display='block'; document.getElementById('form-premium').style.display='none';"> Estándar</label>
                    <label style="margin-left: 20px;"><input type="radio" name="tipo" value="premium" onchange="document.getElementById('form-estandar').style.display='none'; document.getElementById('form-premium').style.display='block';"> Premium (30€/año + 30% dto)</label>
                </div>

                <!-- Formulario estándar -->
                <form th:action="@{/clientes}" method="post" id="form-estandar">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" required placeholder="email@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label>Nombre *</label>
                            <input type="text" name="nombre" required placeholder="Nombre completo">
                        </div>
                        <div class="form-group">
                            <label>Domicilio *</label>
                            <input type="text" name="domicilio" required placeholder="Dirección">
                        </div>
                        <div class="form-group">
                            <label>NIF *</label>
                            <input type="text" name="nif" required placeholder="12345678A" maxlength="10">
                        </div>
                    </div>
                    <small style="display:block; color:#666;">Paga lo que vale</small>
                    <button type="submit" class="btn btn-primary">Guardar Estándar</button>
                </form>

                <!-- Formulario premium -->
                <form th:action="@{/clientes}" method="post" id="form-premium" style="display:none;">
                    <input type="hidden" name="esPremium" value="true">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" required placeholder="email@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label>Nombre *</label>
                            <input type="text" name="nombre" required placeholder="Nombre completo">
                        </div>
                        <div class="form-group">
                            <label>Domicilio *</label>
                            <input type="text" name="domicilio" required placeholder="Dirección">
                        </div>
                        <div class="form-group">
                            <label>NIF *</label>
                            <input type="text" name="nif" required placeholder="12345678A" maxlength="10">
                        </div>
                    </div>
                    <small style="display:block; color:#666;">Cuota: 30€/año - Descuento: 30% en compras</small>
                    <button type="submit" class="btn btn-warning">Guardar Premium</button>
                </form>
            </div>
        </div>

        <!-- Lista de Clientes -->
       <div class="panel">
                <h2 th:switch="${activa}" class="titulo-tabla">
                    <span th:case="'baja'">Clientes en Baja</span>
                    <span th:case="'premium'">Clientes Premium</span>
                    <span th:case="'estandar'">Clientes Estandar</span>
                    <span th:case="*">Todos los Clientes</span>
            <table class="tabla-datos">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Nombre</th>
                        <th>Domicilio</th>
                        <th>NIF</th>
                        <th>Cuota</th>
                        <th>Tipo</th>
                        <th>Alta</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="cliente : ${clientes}">
                    <tr>
                        <td th:text="${cliente.email}">email</td>
                        <td th:text="${cliente.nombre}">nombre</td>
                        <td th:text="${cliente.domicilio}">domicilio</td>
                        <td th:text="${cliente.nif}">nif</td>
                        <td th:text="${cliente.cuotaAnual} + ' €'">0 €</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${cliente.esPremium} ? 'badge-premium' : 'badge-estandar'"
                                  th:text="${cliente.esPremium} ? 'Premium' : 'Estandar'">
                            </span>
                        </td>
                        <td th:text="${cliente.fechaAlta}">fecha</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${cliente.fechaBaja == null} ? 'badge-success' : 'badge-danger'"
                                  th:text="${cliente.fechaBaja == null} ? 'Activo' : 'Baja'">
                            </span>
                        </td>
                        <td class="acciones">
                            <div th:if="${cliente.fechaBaja == null}">
                                <button type="button" class="btn btn-warning" 
                                        th:onclick="'mostrarEditar(' + ${cliente.id} + ')'">✏️</button>
                                
                                <!-- Escalar a premium si es estándar -->
                                <form th:if="${!cliente.esPremium}" th:action="@{/clientes/escalar}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${cliente.id}">
                                    <input type="hidden" name="cuotaBase" value="100">
                                    <button type="submit" class="btn btn-warning" title="Escalar a Premium">👑</button>
                                </form>
                                
                                <!-- Rebajar si es premium -->
                                <form th:if="${cliente.esPremium}" th:action="@{/clientes/reducir}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${cliente.id}">
                                    <button type="submit" class="btn btn-info" title="Rebajar a Estandar">📉</button>
                                </form>
                                
                                <form th:action="@{/clientes/eliminar}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${cliente.id}">
                                    <button type="submit" class="btn btn-danger" 
                                            onclick="return confirm('¿Dar de baja?')">🗑️</button>
                                </form>
                            </div>
                            <!-- Reactivar si está de baja -->
                            <div th:if="${cliente.fechaBaja != null}">
                                <form th:action="@{/clientes/reactivar}" method="post">
                                    <input type="hidden" name="id" th:value="${cliente.id}">
                                    <button type="submit" class="btn btn-primary">♻️ Reactivar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- Fila de edición -->
                    <tr th:id="'editar-' + ${cliente.id}" class="fila-editar">
                        <td colspan="9">
                            <form th:action="@{/clientes/guardar-modificacion}" method="post">
                                <input type="hidden" name="id" th:value="${cliente.id}">
                                
                                <label>Email:</label>
                                <input type="email" name="email" th:value="${cliente.email}" style="width:150px;">
                                
                                <label>Nombre:</label>
                                <input type="text" name="nombre" th:value="${cliente.nombre}" style="width:150px;">
                                
                                <label>Domicilio:</label>
                                <input type="text" name="domicilio" th:value="${cliente.domicilio}" style="width:200px;">
                                
                                <label>NIF:</label>
                                <input type="text" name="nif" th:value="${cliente.nif}" style="width:80px;">
                                
                                <button type="submit" class="btn btn-primary">💾 Guardar</button>
                                <button type="button" class="btn btn-danger" onclick="cancelarEditar()">✖ Cancelar</button>
                            </form>
                        </td>
                    </tr>
                    </th:block>
                    
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="9" style="text-align:center; color:#888;">
                            No hay clientes
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
